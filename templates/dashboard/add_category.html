{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}
{% load static %}

<link rel="stylesheet" href="{% static 'css/add_category_style.css' %}">

<div class="row">

  <!-- SIDEBAR -->
  {% include 'dashboard/sidebar.html' %}

  <!-- MAIN CONTENT -->
  <div class="col-md-9">

    <!-- FORM CARD -->
    <div class="form-card">

      <h2 class="form-title">Add New Category</h2>

      <form action="{% url 'add_category' %}" method="POST">
        {% csrf_token %}

        {{ form|crispy }}

        <button type="submit" class="submit-btn">
          + Add Category
        </button>
      </form>

    </div>

  </div>

</div>

{% endblock %}
