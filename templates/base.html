{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blogs</title>

  <!-- Bootstrap -->
  <link href="https://getbootstrap.com/docs/4.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="{% static 'css/blog.css' %}" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header class="blog-header py-3 mb-3">
    <div class="row align-items-center">

      <!-- LOGO -->
      <div class="col-md-3">
        <a class="blog-header-logo text-dark" href="/">📰 PressHub</a>
      </div>

      <!-- SEARCH -->
      <div class="col-md-5">
        <form action="{% url 'search' %}" method="GET">
          <div class="input-group">
            <input class="form-control" type="text" name="keyword"
                   value="{{ keyword }}" placeholder="Search articles...">
            <div class="input-group-append">
              <button class="btn">Search</button>
            </div>
          </div>
        </form>
      </div>

      <!-- AUTH -->
      <div class="col-md-4 text-right">

        {% if not user.is_authenticated %}
          <a class="btn btn-warning btn-sm" href="{% url 'login' %}">Login</a>
          <a class="btn btn-outline-secondary btn-sm" href="{% url 'register' %}">Register</a>
        {% else %}
          <span class="user-info"><a href="{% url 'dashboard' %}">Dashboard</a></span>
          &nbsp;
          <a href="{% url 'logout' %}" class="logout-link">Logout</a>
        {% endif %}

      </div>

    </div>
  </header>

  <!-- CATEGORY NAV -->
  <div class="nav-scroller mb-4">
    <nav class="nav d-flex justify-content-between flex-wrap">

      <a class="p-2 text-muted" href="/">All</a>

      {% for cat in categories %}
        <a class="p-2 text-muted" href="{% url 'posts_by_category' cat.id %}">
          {{ cat.category_name }}
        </a>
      {% endfor %}

    </nav>
  </div>

  <!-- MAIN CONTENT -->
  {% block content %}
  {% endblock %}

  <!-- FOOTER -->
  <footer class="blog-footer mt-5">
    <p> Built with Django | Designed by ............</p>
  </footer>

</div>

</body>
</html>
